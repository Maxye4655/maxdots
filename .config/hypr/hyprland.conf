source = /home/max/.cache/wal/colors-hyprland

monitor = , preferred, auto, 1

$terminal = kitty
$fileManager = thunar
$menu = wofi -n

exec-once = hyprctl setcursor Bibata-Modern-Ice 12
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server -s ~/.config/swayosd/style.css
exec-once = waybar
exec-once = pypr
exec-once = dunst
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = hypridle


exec-once = awww-daemon

env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XCURSOR_SIZE,12
cursor = Bibata-Modern-Ice
general {
    gaps_in = 2
    gaps_out = 10
    border_size = 0
    col.active_border = $color9
    col.inactive_border = $color5
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.97
    inactive_opacity = 0.95
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 4
        passes = 3
        ignore_opacity = true
        xray = false
        popups = true
    }
    shadow {
        enabled = false
    }
}

xwayland {
    enabled = true
}

animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 2.5, fluid, popin 70%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_autoreload = true
    focus_on_activate = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = -0.15
    touchpad {
        natural_scroll = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

$mainMod = SUPER

# Super+Space → launcher
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/wofi-toggle.sh

# Super+` → cycle wallpapers
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/cycle-wallpaper.sh
# Super+Alt+grave → wallpaper picker GUI
bind = $mainMod ALT, grave, exec, ~/.config/hypr/scripts/wallpaper-gui.sh

# Super+W → web browser
bind = $mainMod, W, exec, google-chrome-stable

# Super+C → Spotify
bind = $mainMod, C, exec, spotify-launcher

# Super+Q → close window
bind = $mainMod, Q, killactive

# Super+T → terminal
bind = $mainMod, T, exec, $terminal

# Relocated to Super+Alt
bind = $mainMod ALT, B, killactive
bind = $mainMod ALT, R, exec, $menu
bind = $mainMod ALT, Q, exec, $terminal
bind = $mainMod ALT, T, exec, pypr toggle taskbar

bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, F, fullscreen
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10
$osd = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bind = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +3
bind = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -3
bind = ,Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bind = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +10
bind = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -10
bind = ,XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bind = ,XF86AudioNext, exec, swayosd-client --playerctl next
bind = ,XF86AudioPrev, exec, swayosd-client --playerctl previous

bind = ALT,Left, movewindow, l
bind = ALT, right, movewindow, r
bind = ALT, up, movewindow, u
bind = ALT, down, movewindow, d
bind = CTRL, Print, exec, hyprshot -m region -o ~/Screenshots/
bind = , Print, exec, hyprshot -m window -o ~/Screenshots/
bind = ALT, Print, exec, hyprshot -m active -m output -o ~/Screenshots/
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Screenshots/
bind = $mainMod, l, exec, hyprlock
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = ALT, TAB, exec, wlogout -b 2
bind = ALT, a, exec, ~/.config/waybar/scripts/refresh.sh
bind = ALT, B, exec, ~/.config/waybar/scripts/select.sh
bind = $mainMod, M, exit
#bind = CTRL, ESCAPE, exec, gksu #Dont worry about this

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd

windowrule = match:initial_class wallpaper-picker, float on, center on, border_size 0

gesture = 3, horizontal, workspace