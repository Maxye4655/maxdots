source = /home/max/.cache/wal/colors-hyprland

background {
    monitor = eDP-1
    path = $wallpaper
    blur_size = 6
    blur_passes = 4
    brightness = .4
    contrast = .8
}

label {
    monitor = eDP-1
    text = cmd[update:1000] date +"<b>%I:%M</b>"
    color = $color15
    font_size = 72
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 2
    shadow_size = 4
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = cmd[update:1000] date +"<b>%A, %B %d</b>"
    color = $color7
    font_size = 20
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    position = 0, 185
    halign = center
    valign = center
}

shape {
    monitor = eDP-1
    size = 320, 130
    color = $backgroundCol
    rounding = 16
    border_color = $color8
    border_size = 1
    position = 0, -65
    halign = center
    valign = center
}

input-field {
    monitor = eDP-1
    size = 280, 42
    outline_thickness = 0
    dots_size = .22
    dots_rounding = 6
    dots_spacing = .4
    dots_fase_time = 200
    inner_color = $color0
    font_color = $color15
    font_family = CodeNewRoman Nerd Font Propo
    fade_on_empty = false
    rounding = 10
    check_color = $color2
    fail_color = $color1
    fail_text = <b>WRONG</b>
    fail_timeout = 2000
    placeholder_text = <i>password</i>
    hide_input = true
    position = 0, -55
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = <i>hello</i> <b>$USER</b>
    color = $color15
    font_size = 20
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    position = 0, -100
    halign = center
    valign = center
}
