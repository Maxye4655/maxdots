source = /home/max/.cache/wal/colors-hyprland

general {
    hide_cursor = true
}

background {
    monitor = eDP-1
    path = $wallpaper
    blur_size = 8
    blur_passes = 6
    brightness = .3
    contrast = .9
}

input-field {
    monitor = eDP-1
    size = 360, 60
    outline_thickness = 0
    dots_size = .35
    dots_rounding = 2
    dots_spacing = .5
    dots_fase_time = 200
    dots_text_format = 匿
    inner_color = rgba(0,0,0,0)
    outer_color = rgba(0,0,0,0)
    check_color = rgba(0,0,0,0)
    fail_color = rgba(0,0,0,0)
    font_color = $color7
    font_family = CodeNewRoman Nerd Font Propo
    fade_on_empty = true
    rounding = 0
    placeholder_text = 
    fail_text = 
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}
